name: HoYoLAB Auto Check-In

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create config.json5
        run: |
          cat > config.json5 <<EOF
          {
            platforms: {
              genshin: true,
              starrail: true,
              zzz: true
            }
          }
          EOF

      - name: Run check-in
        run: node index.js | tee result.log

      - name: Show result
        run: |
          echo "========== HOYOLAB RESULT =========="
          cat result.log
          echo "===================================="
