name: HoYoLAB Auto Check-In

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install deps
        run: npm install

      - name: Create config.json5
        run: |
          cat > config.json5 <<EOF
          {
            accounts: [
              {
                cookies: {
                  ltuid_v2: "${{ secrets.LTUID_V2 }}",
                  ltoken_v2: "${{ secrets.LTOKEN_V2 }}",
                  account_mid_v2: "${{ secrets.ACCOUNT_MID_V2 }}",
                  cookie_token_v2: "${{ secrets.COOKIE_TOKEN_V2 }}"
                },
                games: ["genshin","starrail","zzz"]
              }
            ]
          }
          EOF

      - name: Run check-in
        run: node index.js
