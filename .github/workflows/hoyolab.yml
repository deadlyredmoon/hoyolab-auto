name: HoYoLAB Auto Check-In

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: read

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create config.json5
        run: |
          cat > config.json5 <<EOF
          {
            accounts: [
              {
                cookies: {
                  ltuid_v2: "test",
                  ltoken_v2: "test",
                  account_mid_v2: "test",
                  cookie_token_v2: "test"
                },
                games: ["genshin", "starrail", "zzz"]
              }
            ]
          }
          EOF

      - name: Run check-in
        run: node index.js | tee result.log

      - name: Show result
        run: |
          echo "========== HOYOLAB RESULT =========="
          cat result.log
          echo "===================================="
