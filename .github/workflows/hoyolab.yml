name: HoYoLAB Auto Check-In

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  check-in:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Create config
        run: |
          cat > config.json <<EOF
          {
            "accounts": [
              {
                "ltuid_v2": "${{ secrets.LTUID_V2 }}",
                "ltoken_v2": "${{ secrets.LTOKEN_V2 }}",
                "account_mid_v2": "${{ secrets.ACCOUNT_MID_V2 }}"
              }
            ]
          }
          EOF

      - name: Run check-in
        run: node index.js --sign
